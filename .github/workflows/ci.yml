name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests dnspython colorama python-whois python-dateutil geopy phonenumbers
        
    - name: Run Build Script (embeds plugins)
      run: ./build.sh
      
    - name: Run Go Tests
      run: go test -count=1 -v ./...

    - name: Run Go Vet
      run: go vet ./...

    - name: Run Race-Sensitive Tests
      run: go test -race -count=1 ./internal/runner ./internal/storage
      
    - name: Run Python Tests
      run: python -m pytest -q
